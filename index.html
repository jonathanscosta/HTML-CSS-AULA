<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Flexbox Centralizado</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .container {
            display: flex;
            justify-content: center; /* Alinha horizontalmente */
            align-items: center;     /* Alinha verticalmente */
            min-height: 100vh;       /* Altura mínima para ver o alinhamento */
            background-color: #f0f0f0;
        }

        .box {
            width: 100px;
            height: 100px;
            margin: 10px;
            background-color: #4CAF50;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
    </div>

</body>
</html>
